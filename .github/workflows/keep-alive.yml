name: Keep render instance alive

on: 
  schedule: 
    # runs every 10 mins
    - cron: '*/10 * * * *'
    
jobs:
    ping:
        runs-on: ubuntu-latest

        steps:
            - name: Ping render app
              run: |
                 echo "Pinging Render instance..."
                    # Replace with your actual Render URL
                    curl -f https://forzabuildbase.onrender.com/health || echo "Ping failed"
                    echo "Ping completed at $(date)"
